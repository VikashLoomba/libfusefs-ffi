name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  RUST_BACKTRACE: 1

jobs:
  checks:
    name: Checks and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Cargo check
        run: cargo check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

  integration-linux:
    name: Linux FUSE integration tests
    runs-on:
      - self-hosted
      - linux
      - fuse
    timeout-minutes: 30
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Verify FUSE prerequisites
        run: |
          test -e /dev/fuse
          command -v fusermount3

      - name: Run real FUSE integration tests
        env:
          REQUIRE_FUSE: '1'
        run: npm run test:integration

  integration-macos:
    name: macOS macFUSE integration tests
    runs-on:
      - self-hosted
      - macOS
      - macfuse
    timeout-minutes: 30
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Verify macFUSE prerequisites
        run: |
          test -e /dev/macfuse0 || test -e /dev/osxfuse0

      - name: Run real FUSE integration tests
        env:
          REQUIRE_FUSE: '1'
        run: npm run test:integration
